name: Daily News Email

on:
  schedule:
    - cron: '30 8 * * *' # 北京时间 16:30
  workflow_dispatch:

# --- 关键修改 1：增加 Issue 写入权限 ---
permissions:
  issues: write
  contents: read

jobs:
  send-newsletter:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # --- 关键修改 2：必须补全 akshare 和 pandas ---
          pip install feedparser resend akshare pandas requests

      - name: Run RSS and Stock Analysis script
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          RECEIVER_EMAIL: ${{ secrets.RECEIVER_EMAIL }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: |
          python main.py

      - name: Send notification on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: '❌ 投研日报任务运行失败',
              body: `脚本运行出现错误。请检查 Actions 日志。`
            })
