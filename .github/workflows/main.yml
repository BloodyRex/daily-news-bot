  name: Daily RSS Email Newsletter

on:                                                                                                                      
    schedule:                                                                                                              
      # Run daily at 9:00 AM Beijing Time (UTC+8) = 1:00 AM UTC
      # Cron format: minute hour day month day-of-week
      - cron: '0 1 * * *'

    # Allow manual trigger
    workflow_dispatch:

  jobs:
    send-newsletter:
      runs-on: ubuntu-latest

      steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install feedparser resend

      - name: Run RSS newsletter script
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          RECEIVER_EMAIL: ${{ secrets.RECEIVER_EMAIL }}
        run: |
          python main.py

      - name: Send notification on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: '❌ Daily RSS Email Newsletter Failed',
              body: `The daily RSS email newsletter failed to run. Please check the workflow run: ${context.runId}`        
            })
